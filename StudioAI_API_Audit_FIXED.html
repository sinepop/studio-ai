// ═══════════════════════════════════════════════════════════════
//  Component: Track Dropdown (Header)
// ═══════════════════════════════════════════════════════════════
function TrackDropdown({ track, cfg, fetchedModels, modelsLoading, onSelect, onClose, onOpenSettings }) {
  const [selProv, setSelProv] = useState(
    track==="chat" ? cfg.chatProvider : track==="img" ? cfg.imgProvider : cfg.vidProvider
  );
  const providers = track==="chat" ? CHAT_PROVIDERS : track==="img" ? IMG_PROVIDERS : VID_PROVIDERS;
  const curModel = track==="chat" ? cfg.chatModel : track==="img" ? cfg.imgModel : cfg.vidModel;
  const models = fetchedModels[selProv] || [];
  const prov = providers.find(p=>p.id===selProv);

  return (
    <div style={{
      position:"absolute", top:"100%", right:0, marginTop:4, zIndex:100,
      width:280, background:"var(--bg-elevated)", border:"1px solid var(--border-default)",
      borderRadius:8, boxShadow:"0 8px 32px rgba(0,0,0,0.4)", overflow:"hidden",
      animation:"fadeUp .2s var(--ease-out)",
    }}>
      {/* Provider tabs */}
      <div style={{display:"flex",gap:0,borderBottom:"1px solid var(--border-subtle)",overflowX:"auto"}}>
        {providers.filter(p=>!p.noKey || track!=="img").map(p=>(
          <button key={p.id} onClick={()=>setSelProv(p.id)}
            style={{
              flex:"0 0 auto", padding:"6px 10px", fontSize:9, fontWeight:500,
              background: selProv===p.id ? "var(--accent-soft)" : "transparent",
              color: selProv===p.id ? "var(--accent)" : "var(--text-muted)",
              border:"none", borderBottom: selProv===p.id ? "2px solid var(--accent)" : "2px solid transparent",
              transition:"all .15s", whiteSpace:"nowrap",
            }}
            onMouseEnter={e=>{if(selProv!==p.id)e.currentTarget.style.color="var(--text-secondary)";}}
            onMouseLeave={e=>{if(selProv!==p.id)e.currentTarget.style.color="var(--text-muted)";}}
          >{p.name.split("(")[0].trim()}</button>
        ))}
      </div>
      {/* Provider info */}
      {prov && (
        <div style={{padding:"8px 12px 4px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{fontSize:9,color:"var(--text-ghost)",letterSpacing:"0.04em"}}>
            {prov.defaultUrl ? prov.defaultUrl.replace(/https?:\/\//,"").slice(0,30) : "无需 URL"}
          </span>
          {modelsLoading[selProv] && (
            <Ic n="refresh" size={9} sw={1.4} className="spin-anim"/>
          )}
        </div>
      )}
      {/* Models list */}
      <div style={{maxHeight:240,overflowY:"auto",padding:"4px 6px 8px"}}>
        {models.length > 0 ? models.map(m=>(
          <button key={m.id} onClick={()=>onSelect(selProv, m.id)}
            style={{
              display:"block", width:"100%", textAlign:"left", padding:"5px 8px",
              fontSize:10, fontFamily:"var(--font-mono)",
              background: curModel===m.id ? "var(--accent-soft)" : "transparent",
              color: curModel===m.id ? "var(--accent)" : "var(--text-secondary)",
              border: curModel===m.id ? "1px solid var(--border-accent)" : "1px solid transparent",
              borderRadius:4, transition:"all .1s", cursor:"pointer",
            }}
            onMouseEnter={e=>{if(curModel!==m.id){e.currentTarget.style.background="var(--bg-hover)";e.currentTarget.style.color="var(--text-primary)";}}}
            onMouseLeave={e=>{if(curModel!==m.id){e.currentTarget.style.background="transparent";e.currentTarget.style.color="var(--text-secondary)";}}}
          >{m.id}</button>
        )) : (
          <div style={{padding:"12px 8px",textAlign:"center"}}>
            <p style={{fontSize:10,color:"var(--text-muted)"}}>
              请先在设置中填写 API Key
            </p>
            <button onClick={()=>{onClose();onOpenSettings&&onOpenSettings();}}
              style={{
                marginTop:6, padding:"3px 10px", fontSize:9, borderRadius:4,
                background:"var(--accent-soft)", border:"1px solid var(--border-accent)",
                color:"var(--accent)", fontWeight:500, cursor:"pointer",
              }}>去设置</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  Main App
// ═══════════════════════════════════════════════════════════════
let cardId = 0;

function App() {
  const init = loadCfg();
  const fromCC = !!window.claudeConfig;

  const [cfg, setCfg] = useState(()=>{
    // 构建 per-provider 存储，兼容旧配置
    const initPK = init.providerKeys || {};
    const mkP = (track, providers, defaults) => {
      const out = initPK[track] || {};
      providers.forEach(p => {
        if (!out[p.id]) out[p.id] = { key:"", base:p.defaultUrl||"" };
      });
      // 从旧配置迁移
      if (defaults) Object.entries(defaults).forEach(([k,v]) => {
        if (v && !out[k]?.key) out[k] = { key:v.key||"", base:v.base||"" };
      });
      return out;
    };
    const chatPK = mkP("chat", CHAT_PROVIDERS, {
      claude:   { key:init.claudeKey||init.chatKey||"", base:init.claudeBase||init.chatBase||"https://api.anthropic.com" },
      deepseek: { key:init.deepseekKey||"", base:init.deepseekUrl||"https://api.deepseek.com" },
      kimi:     { key:init.kimiKey||"", base:init.kimiUrl||"https://api.moonshot.cn" },
    });
    const imgPK = mkP("img", IMG_PROVIDERS, {
      dalle: { key:init.dalleKey||init.imgKey||init.nbKey||init.im2Key||init.relayKey||"",
               base:init.dalleUrl||init.imgBase||init.nbUrl||init.im2Url||init.relayUrl||"https://api.openai.com" },
    });
    const vidPK = mkP("vid", VID_PROVIDERS, {
      runway: { key:init.runwayKey||init.vidKey||"", base:init.runwayUrl||init.vidBase||"https://api.dev.runwayml.com" },
    });
    const cp = init.chatProvider || "claude";
    const ip = init.imgProvider || "dalle";
    const vp = init.vidProvider || "jimeng_vid";
    return {
      chatProvider: cp, chatModel: init.chatModel||init.model||init.claudeModel||getProviderDefaultModel("chat", cp)||"claude-sonnet-4-6",
      chatFormat: init.chatFormat || (CHAT_PROVIDERS.find(p=>p.id===cp)?.format)||"anthropic",
      chatKey: chatPK[cp]?.key||"", chatBase: chatPK[cp]?.base||"",
      imgProvider: ip, imgModel: init.imgModel||init.nbModel||init.im2Model||init.relayModel||getProviderDefaultModel("img", ip)||"",
      imgKey: imgPK[ip]?.key||"", imgBase: imgPK[ip]?.base||"",
      vidProvider: vp, vidModel: init.vidModel||getProviderDefaultModel("vid", vp)||"gen4_turbo",
      vidKey: vidPK[vp]?.key||"", vidBase: vidPK[vp]?.base||"",
      thinkingEnabled: !!init.thinkingEnabled,
      thinkingEffort: init.thinkingEffort || "medium",
      thinkingShowSummary: init.thinkingShowSummary !== false,
      apiProxyBase: init.apiProxyBase || "",
      proxyAll: !!init.proxyAll,
      providerKeys: { chat:chatPK, img:imgPK, vid:vidPK },
    };
  });
  const updateCfg = c => { setCfg(c); saveCfg(c); };

  // 更新某个 provider 的凭证（同时同步 flat keys）
  const updateProviderKey = (track, providerId, field, value) => {
    const c = {...cfg};
    const pk = {...c.providerKeys};
    const trackPk = {...pk[track]};
    trackPk[providerId] = {...(trackPk[providerId]||{key:"",base:""}), [field]:value};
    pk[track] = trackPk;
    c.providerKeys = pk;
    // sync flat keys if this is the active provider
    if (track==="chat" && providerId===c.chatProvider) {
      c.chatKey = trackPk[providerId].key;
      c.chatBase = trackPk[providerId].base;
    }
    if (track==="img" && providerId===c.imgProvider) {
      c.imgKey = trackPk[providerId].key;
      c.imgBase = trackPk[providerId].base;
    }
    if (track==="vid" && providerId===c.vidProvider) {
      c.vidKey = trackPk[providerId].key;
      c.vidBase = trackPk[providerId].base;
    }
    updateCfg(c);
  };

  // 切换 active provider 时同步 flat keys
  const switchProvider = (track, providerId) => {
    const c = {...cfg};
    const p = getProviderById(track, providerId);
    if (track==="chat") {
      c.chatProvider = providerId;
      c.chatFormat = p?.format || "openai";
      c.chatKey = c.providerKeys?.chat?.[providerId]?.key || "";
      c.chatBase = c.providerKeys?.chat?.[providerId]?.base || p?.defaultUrl || "";
      const ms = fetchedModels[providerId];
      c.chatModel = ms?.length>0 ? ms[0].id : (p?.defaultModel || c.chatModel || "");
    } else if (track==="img") {
      c.imgProvider = providerId;
      c.imgKey = c.providerKeys?.img?.[providerId]?.key || "";
      c.imgBase = c.providerKeys?.img?.[providerId]?.base || p?.defaultUrl || "";
      const ms = fetchedModels[providerId];
      c.imgModel = ms?.length>0 ? ms[0].id : (p?.defaultModel || "");
    } else if (track==="vid") {
      c.vidProvider = providerId;
      c.vidKey = c.providerKeys?.vid?.[providerId]?.key || "";
      c.vidBase = c.providerKeys?.vid?.[providerId]?.base || p?.defaultUrl || "";
      const ms = fetchedModels[providerId];
      c.vidModel = ms?.length>0 ? ms[0].id : (p?.defaultModel || "");
    }
    updateCfg(c);
  };

  // 测试 API 连通性
  const testConnection = async (track, providerId) => {
    const pk = cfg.providerKeys?.[track]?.[providerId];
    if (!pk) return { ok:false, msg:"未配置" };
    if (track === "chat") {
      const prov = CHAT_PROVIDERS.find(p=>p.id===providerId);
      const base = pk.base || prov?.defaultUrl || "";
      const fmt = prov?.format || (providerId === "claude" ? "anthropic" : "openai");
      if (!pk.key) return { ok:false, msg:"未填写 API Key" };
      if (!base) return { ok:false, msg:"未填写 Base URL" };
      try {
        if (fmt === "anthropic") {
          const r = await apiFetch(cleanBase(base)+"/v1/messages", {
            method:"POST",
            signal: AbortSignal.timeout(12000),
            headers:{
              "Content-Type":"application/json",
              "x-api-key":pk.key.trim(),
              "anthropic-version":"2023-06-01",
              "anthropic-dangerous-direct-browser-access":"true",
            },
            body:JSON.stringify({ model:cfg.chatModel || "claude-sonnet-4-5", max_tokens:8, messages:[{role:"user",content:"hi"}] }),
          });
          if (r.ok) return { ok:true, msg:"连接成功" };
          const e = await r.json().catch(()=>({}));
          return { ok:false, msg:`${r.status}: ${e.error?.message || e.message || "未知错误"}` };
        }
        const r = await apiFetch(getOpenAIModelsURL(base), {
          method:"GET",
          signal: AbortSignal.timeout(12000),
          headers:{ "Authorization":`Bearer ${pk.key.trim()}` },
        });
        if (r.ok) return { ok:true, msg:"连接成功" };
        const e = await r.json().catch(()=>({}));
        return { ok:false, msg:`${r.status}: ${e.error?.message || e.message || "未知错误"}` };
      } catch(e) { return { ok:false, msg:"网络错误: "+e.message }; }
    }

    const prov = (track==="img" ? IMG_PROVIDERS : VID_PROVIDERS).find(p=>p.id===providerId);
    if (prov?.noKey) return { ok:true, msg:"无需 Key" };
    const base = pk.base || prov?.defaultUrl || "";
    if (!pk.key) return { ok:false, msg:"未填写 API Key" };
    if (!base) return { ok:false, msg:"未填写 Base URL" };

    // 图片轨道可以用 /v1/models 测连通；视频轨道很多服务商没有 models 接口，因此只做轻量认证/可达性提示。
    if (track === "vid" && providerId === "runway") {
      return { ok:true, msg:"配置已保存；Runway 将在生成时创建任务并轮询结果" };
    }
    try {
      const r = await apiFetch(getOpenAIModelsURL(base), {
        method:"GET",
        signal: AbortSignal.timeout(12000),
        headers:{ "Authorization":`Bearer ${pk.key.trim()}` },
      });
      if (r.ok) return { ok:true, msg:"连接成功" };
      const e = await r.json().catch(()=>({}));
      return { ok:false, msg:`${r.status}: ${e.error?.message || e.message || "未知错误"}` };
    } catch(e) { return { ok:false, msg:"网络错误: "+e.message }; }
  };

  const [msgs,   setMsgs]     = useState([{ id:"welcome",role:"assistant",
    content:"你好！我是 Studio AI 创意设计助理。告诉我你想创作什么，我会帮你生成高质量的设计作品。", isWelcome:true }]);
  const [input,  setInput]    = useState("");
  const [busy,   setBusy]     = useState(false);
  const [canvas, setCanvas]   = useState([]);
  const [selId,  setSelId]    = useState(null);
  const [sets,   setSets]     = useState(false);
  const [openTrack, setOpenTrack] = useState(null); // null | "chat" | "img" | "vid"
  const [stylePreset, setStylePreset] = useState("");
  const [styleOpen, setStyleOpen] = useState(false);
  const [aspectRatio, setAspectRatio] = useState("1:1");
  const [fetchedModels, setFetchedModels] = useState({});
  const [modelsLoading, setModelsLoading] = useState({});
  const endRef = useRef(null);

  useEffect(()=>{ endRef.current?.scrollIntoView({behavior:"smooth"}); },[msgs]);

  const selItem = canvas.find(c=>c.id===selId)||null;
  const chatModel = cfg.chatModel || "claude-sonnet-4-6";

  // 自动获取模型列表（仅当前激活的 provider）
  const fetchAllModels = useCallback(async () => {
    // Chat track
    if (cfg.chatKey && cfg.chatBase) {
      setModelsLoading(prev=>({...prev,[cfg.chatProvider]:true}));
      const models = await fetchModelsFromProvider(cfg.chatKey, cfg.chatBase, cfg.chatFormat, cfg.chatProvider);
      setFetchedModels(prev=>({...prev,[cfg.chatProvider]:models}));
      setModelsLoading(prev=>({...prev,[cfg.chatProvider]:false}));
    }
    // Image track
    if (cfg.imgKey && cfg.imgBase) {
      setModelsLoading(prev=>({...prev,[cfg.imgProvider]:true}));
      const models = await fetchModelsFromProvider(cfg.imgKey, cfg.imgBase, "openai", cfg.imgProvider);
      setFetchedModels(prev=>({...prev,[cfg.imgProvider]:models}));
      setModelsLoading(prev=>({...prev,[cfg.imgProvider]:false}));
    }
    // Video track
    if (cfg.vidKey && cfg.vidBase) {
      setModelsLoading(prev=>({...prev,[cfg.vidProvider]:true}));
      const models = await fetchModelsFromProvider(cfg.vidKey, cfg.vidBase, "openai", cfg.vidProvider);
      setFetchedModels(prev=>({...prev,[cfg.vidProvider]:models}));
      setModelsLoading(prev=>({...prev,[cfg.vidProvider]:false}));
    }
  }, [cfg]);

  // debounce 自动拉取
  useEffect(()=>{
    const t = setTimeout(fetchAllModels, 800);
    return ()=>clearTimeout(t);
  }, [cfg.chatProvider,cfg.chatKey,cfg.chatBase,cfg.imgProvider,cfg.imgKey,cfg.imgBase,cfg.vidProvider,cfg.vidKey,cfg.vidBase]);

  // 拉取完成后自动选择第一个模型（如果当前模型不在列表中）
  useEffect(()=>{
    const u = {};
    const chatMs = fetchedModels[cfg.chatProvider];
    if (chatMs?.length > 0 && !chatMs.some(m => m.id === cfg.chatModel)) {
      u.chatModel = chatMs[0].id;
    }
    const imgMs = fetchedModels[cfg.imgProvider];
    if (imgMs?.length > 0 && !imgMs.some(m => m.id === cfg.imgModel)) {
      u.imgModel = imgMs[0].id;
    }
    const vidMs = fetchedModels[cfg.vidProvider];
    if (vidMs?.length > 0 && cfg.vidModel && !vidMs.some(m => m.id === cfg.vidModel)) {
      u.vidModel = vidMs[0].id;
    }
    if (Object.keys(u).length > 0) {
      const c = {...cfg, ...u};
      setCfg(c); saveCfg(c);
    }
  }, [fetchedModels]);

  // 合并模型列表（按轨道分组，附带 provider 元数据）
  const chatModelOptions = (() => {
    const groups = [];
    CHAT_PROVIDERS.forEach(p => {
      if (p.id === "custom_chat") return;
      const models = fetchedModels[p.id];
      if (models?.length > 0) {
        groups.push({ label:p.name, providerId:p.id, format:p.format, models:models.map(m=>({id:m.id,label:m.id})) });
      }
    });
    groups.push({ label:"自定义", providerId:"custom_chat", models:[{id:"__custom__",label:"手动输入模型 ID"}] });
    return groups;
  })();

  const imgModelOptions = (() => {
    const groups = [];
    IMG_PROVIDERS.filter(p=>!p.noKey && p.id!=="custom_img").forEach(p => {
      const models = fetchedModels[p.id];
      if (models?.length > 0) {
        groups.push({ label:p.name, providerId:p.id, models:models.map(m=>({id:m.id,label:m.id})) });
      }
    });
    groups.push({ label:"自定义", providerId:"custom_img", models:[{id:"__custom_img",label:"手动输入模型 ID"}] });
    return groups;
  })();

  const vidModelOptions = (() => {
    const groups = [];
    VID_PROVIDERS.filter(p=>p.id!=="custom_vid").forEach(p => {
      const models = fetchedModels[p.id];
      if (models?.length > 0) {
        groups.push({ label:p.name, providerId:p.id, models:models.map(m=>({id:m.id,label:m.id})) });
      }
    });
    groups.push({ label:"自定义", providerId:"custom_vid", models:[{id:"__custom_vid",label:"手动输入模型 ID"}] });
    return groups;
  })();

  const addMsg = m => setMsgs(p=>[...p,{id:Date.now()+Math.random(),...m}]);

  const snapshotProvider = (type) => {
    if (type === "video") return {
      track:"vid",
      provider:cfg.vidProvider || "runway",
      protocol:getProviderById("vid", cfg.vidProvider)?.protocol,
      key:cfg.vidKey,
      base:cfg.vidBase,
      model:cfg.vidModel,
    };
    return {
      track:"img",
      provider:cfg.imgProvider || "dalle",
      protocol:getProviderById("img", cfg.imgProvider)?.protocol,
      key:cfg.imgKey,
      base:cfg.imgBase,
      model:cfg.imgModel,
    };
  };

  const normalizeTasks = (parsed) => {
    const list = parsed?.tasks || parsed?.prompts || [];
    return Array.isArray(list) ? list : [];
  };

  const runCanvasCard = async (card) => {
    setCanvas(p=>p.map(c=>c.id===card.id?{...c,status:"loading",progress:card.progress||3,err:null}:c));
    try {
      const result = await runMediaTask(card, progress => {
        setCanvas(p=>p.map(c=>c.id===card.id?{...c,progress}:c));
      });
      setCanvas(p=>p.map(c=>c.id===card.id?{...c,...result,status:"done",progress:100}:c));
    } catch(e) {
      setCanvas(p=>p.map(c=>c.id===card.id?{...c,status:"error",err:e.message,progress:0}:c));
    }
  };

  const send = async () => {
    if (!input.trim()||busy) return;
    if (!cfg.chatKey) { setSets(true); addMsg({role:"assistant",isError:true,
      content:"请先在设置中填写文本 API Key。"}); return; }
    const text = input.trim();
    setInput(""); setBusy(true);
    addMsg({role:"user",content:text});

    try {
      const sys = buildSys(canvas, selItem, stylePreset, aspectRatio);
      const chatCfg = {
        key:cfg.chatKey,
        base:cfg.chatBase,
        model:chatModel,
        chatFormat:cfg.chatFormat,
        thinkingEnabled:cfg.thinkingEnabled,
        thinkingEffort:cfg.thinkingEffort,
        thinkingShowSummary:cfg.thinkingShowSummary,
      };
      const liveThinking = cfg.thinkingEnabled && /deepseek/i.test(String(cfg.chatBase || cfg.chatProvider || ""));
      const liveMsgId = liveThinking ? Date.now()+Math.random() : null;
      if (liveMsgId) {
        setMsgs(p=>[...p,{id:liveMsgId, role:"assistant", content:"正在深度思考…", thinkingSummary:"等待 DeepSeek 返回 reasoning_content…", plan:[]}]);
      }

      const { parsed, raw, thinkingSummary } = await callChat(
        [...msgs, {role:"user",content:text}], sys, chatCfg,
        {
          onThinking:(s)=>{
            if (!liveMsgId) return;
            setMsgs(p=>p.map(m=>m.id===liveMsgId?{...m,content:"正在深度思考…",thinkingSummary:s}:m));
          },
          onContent:(s)=>{
            if (!liveMsgId) return;
            setMsgs(p=>p.map(m=>m.id===liveMsgId?{...m,content:"正在整理最终计划…"}:m));
          }
        }
      );

      const styleSuffix = stylePreset ? (STYLE_PRESETS.find(s=>s.id===stylePreset)?.suffix||"") : "";
      const tasks = normalizeTasks(parsed).map(t => ({...t}));
      tasks.forEach(t => {
        if (styleSuffix && t.prompt && (t.type || "image") === "image") t.prompt = t.prompt + styleSuffix;
      });

      const finalAssistantMsg = { role:"assistant",
        content:parsed.reply||"正在处理…",
        understanding:parsed.understanding,
        plan:parsed.plan,
        thinkingSummary,
        labels:tasks.map(p=>p.label).filter(Boolean),
        rawContent:raw
      };
      if (liveMsgId) setMsgs(p=>p.map(m=>m.id===liveMsgId?{...m,...finalAssistantMsg}:m));
      else addMsg(finalAssistantMsg);

      const genTriggers = /生图|生成|画一?张|create|generate|draw|image|video|生视频|出图|做图|搞一?张|来一?张|做一?个|动起来|动画|短片|镜头|运镜/;
      const userIntent = genTriggers.test(text);
      const isModify = /修改|调整|改|换|replace|modify|change|update/.test(text) && selItem;
      const parsedIntent = parsed.intent || parsed.action || "chat";
      const shouldRun = tasks.length>0 && parsedIntent !== "chat" && (userIntent || isModify || /generate|modify|video|image/i.test(parsedIntent));

      if (shouldRun) {
        const newCards = tasks.map(t => {
          const type = t.type || (parsedIntent.includes("video") ? "video" : "image");
          const sourceId = t.source_image_id || t.modifies_id || t.modifiesId || (selItem ? selItem.id : null);
          const source = sourceId ? canvas.find(c => String(c.id) === String(sourceId)) : null;
          return {
            id:++cardId,
            type,
            label:t.label || (type==="video" ? "视频" : "图片"),
            prompt:t.prompt,
            negative:t.negative_prompt || t.negative,
            providerSnapshot:snapshotProvider(type),
            prov:type==="video" ? (cfg.vidProvider||"runway") : (cfg.imgProvider||"dalle"),
            status:"loading",
            progress:0,
            imageUrl:null,
            videoUrl:null,
            taskId:null,
            err:null,
            sourceImageId:source?.id || null,
            sourceImageUrl:source?.imageUrl || source?.url || null,
            duration:Number(t.duration || 5),
            ratio:t.ratio || aspectRatio,
            modifiesId:source?.id || null,
          };
        });
        setCanvas(prev=>[...newCards,...prev]);
        newCards.forEach(async (card,i)=>{
          await sleep(i*350);
          runCanvasCard(card);
        });
      }
    } catch(e) { addMsg({role:"assistant",isError:true,content:e.message}); }
    setBusy(false);
  };

  const regen = useCallback((item)=>{
    const card = {
      ...item,
      providerSnapshot:item.providerSnapshot || snapshotProvider(item.type || "image"),
      status:"loading",
      progress:0,
      imageUrl:null,
      videoUrl:null,
      err:null,
    };
    setCanvas(p=>p.map(c=>c.id===item.id?card:c));
    runCanvasCard(card);
  },[cfg, aspectRatio, canvas]);

  const modItem = useCallback((item)=>{ setSelId(item.id); setInput("修改这张图："); },[]);
  const delItem = useCallback((id)=>{ setCanvas(p=>p.filter(c=>c.id!==id)); if(selId===id)setSelId(null); },[selId]);
  const resetChat = ()=>setMsgs([{id:"welcome",role:"assistant",content:"对话已重置，画布内容保留。继续告诉我你想创作什么。",isWelcome:true}]);
  const quickIdea = (text)=>{ setInput(text); };

  return (
    <div className="app-enter" style={{height:"100%",display:"flex",flexDirection:"column",background:"var(--bg-primary)"}}>

      {/* ── Header ── */}
      <header style={{
        display:"flex", alignItems:"center", justifyContent:"space-between",
        padding:"10px 20px", borderBottom:"1px solid var(--border-subtle)",
        background:"var(--bg-primary)", flexShrink:0,
      }}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{
            width:30, height:30, borderRadius:9,
            background:"var(--bg-surface)", border:"1px solid var(--border-accent)",
            display:"flex", alignItems:"center", justifyContent:"center",
          }}>
            <Ic n="sparkle" size={14} color="var(--accent)" sw={1.3}/>
          </div>
          <span style={{
            fontFamily:"var(--font-display)", fontSize:17, fontWeight:400,
            letterSpacing:"-0.01em", fontStyle:"italic", color:"var(--text-primary)",
          }}>Studio AI</span>
          {fromCC && (
            <div style={{
              display:"flex", alignItems:"center", gap:4, padding:"3px 9px",
              background:"var(--success-soft)", border:"1px solid rgba(93,174,139,0.15)",
              borderRadius:20,
            }}>
              <Ic n="check" size={8} color="var(--success)" sw={1.8}/>
              <span style={{fontSize:9,color:"var(--success)",fontWeight:500}}>CC Switch</span>
            </div>
          )}
        </div>

        <div style={{display:"flex",alignItems:"center",gap:6}}>
          {/* ── 三轨道选择器 ── */}
          {[
            {track:"chat", icon:"sparkle", label:"文本",
              provider: CHAT_PROVIDERS.find(p=>p.id===cfg.chatProvider),
              model: chatModel, color:"var(--accent)"},
            {track:"img", icon:"image", label:"图片",
              provider: IMG_PROVIDERS.find(p=>p.id===cfg.imgProvider),
              model: cfg.imgModel||cfg.imgProvider, color:"var(--text-muted)"},
            {track:"vid", icon:"film", label:"视频",
              provider: VID_PROVIDERS.find(p=>p.id===cfg.vidProvider),
              model: cfg.vidModel||cfg.vidProvider, color:"var(--text-muted)"},
          ].map(({track,icon,label,provider,model,color}) => (
            <div key={track} style={{position:"relative"}}>
              <button onClick={()=>setOpenTrack(openTrack===track?null:track)}
                style={{
                  display:"flex", alignItems:"center", gap:5,
                  padding:"5px 10px", fontSize:10, borderRadius:6,
                  background: openTrack===track ? "var(--accent-soft)" : "var(--bg-surface)",
                  border:`1px solid ${openTrack===track ? "var(--border-accent)" : "var(--border-subtle)"}`,
                  color: openTrack===track ? "var(--accent)" : color,
                  fontWeight:500, transition:"all .15s", cursor:"pointer",
                }}>
                <Ic n={icon} size={10} sw={1.3}/>
                <span>{label}</span>
                <span style={{fontSize:8,color:"var(--text-ghost)",maxWidth:80,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                  {provider?.name?.split(" ")[0]}/{model?.split("/").pop()?.slice(0,16)||"…"}
                </span>
                <Ic n={openTrack===track?"chevUp":"chevDown"} size={8} sw={1.5}/>
              </button>
              {/* Dropdown */}
              {openTrack===track && <TrackDropdown track={track} cfg={cfg}
                fetchedModels={fetchedModels} modelsLoading={modelsLoading}
                onSelect={(provId,modelId)=>{
                  // Single atomic update to avoid stale-state race
                  const c = {...cfg};
                  const p = (track==="chat"?CHAT_PROVIDERS:track==="img"?IMG_PROVIDERS:VID_PROVIDERS).find(x=>x.id===provId);
                  if (track==="chat") {
                    c.chatProvider = provId;
                    c.chatKey = c.providerKeys?.chat?.[provId]?.key || "";
                    c.chatBase = c.providerKeys?.chat?.[provId]?.base || p?.defaultUrl || "";
                    if (p) c.chatFormat = p.format || "openai";
                    if (modelId) c.chatModel = modelId;
                    const ms = fetchedModels[provId];
                    if (!modelId && ms?.length>0) c.chatModel = ms[0].id;
                  } else if (track==="img") {
                    c.imgProvider = provId;
                    c.imgKey = c.providerKeys?.img?.[provId]?.key || "";
                    c.imgBase = c.providerKeys?.img?.[provId]?.base || p?.defaultUrl || "";
                    if (modelId) c.imgModel = modelId;
                    const ms = fetchedModels[provId];
                    if (!modelId && ms?.length>0) c.imgModel = ms[0].id;
                  } else if (track==="vid") {
                    c.vidProvider = provId;
                    c.vidKey = c.providerKeys?.vid?.[provId]?.key || "";
                    c.vidBase = c.providerKeys?.vid?.[provId]?.base || p?.defaultUrl || "";
                    if (modelId) c.vidModel = modelId;
                    const ms = fetchedModels[provId];
                    if (!modelId && ms?.length>0) c.vidModel = ms[0].id;
                  }
                  updateCfg(c);
                  setOpenTrack(null);
                }}
                onClose={()=>setOpenTrack(null)}
                onOpenSettings={()=>setSets(true)}/>}
            </div>
          ))}

          <div style={{width:1,height:16,background:"var(--border-subtle)",margin:"0 2px"}}/>

          <button onClick={()=>setSets(!sets)}
            style={{
              display:"flex", alignItems:"center", gap:6,
              padding:"6px 12px", fontSize:11, borderRadius:6,
              background: sets ? "var(--accent-soft)" : "var(--bg-surface)",
              border:`1px solid ${sets ? "var(--border-accent)" : "var(--border-default)"}`,
              color: sets ? "var(--accent)" : "var(--text-muted)",
              fontWeight:500, transition:"all .2s",
            }}>
            <Ic n="gear" size={12} sw={1.4}/>
            设置
            {!cfg.chatKey && (
              <span style={{width:5,height:5,borderRadius:"50%",background:"var(--danger)",marginLeft:1}}/>
            )}
          </button>
        </div>
      </header>

      {sets && <SettingsPanel cfg={cfg} onChange={updateCfg} fromCC={fromCC}
        fetchedModels={fetchedModels} modelsLoading={modelsLoading}
        updateProviderKey={updateProviderKey} switchProvider={switchProvider}
        testConnection={testConnection}
        onFetchModels={async(id)=>{
          let k="",u="";
          // Look up per-provider credentials, not the active provider's flat keys
          const chatProv = CHAT_PROVIDERS.find(p=>p.id===id);
          const imgProv = IMG_PROVIDERS.find(p=>p.id===id);
          const vidProv = VID_PROVIDERS.find(p=>p.id===id);
          if (chatProv) { const pk = cfg.providerKeys?.chat?.[id]; k=pk?.key||""; u=pk?.base||chatProv.defaultUrl||""; }
          else if (imgProv) { const pk = cfg.providerKeys?.img?.[id]; k=imgProv.noKey?"":(pk?.key||""); u=pk?.base||imgProv.defaultUrl||""; }
          else if (vidProv) { const pk = cfg.providerKeys?.vid?.[id]; k=pk?.key||""; u=pk?.base||vidProv.defaultUrl||""; }
          if ((!k && !imgProv?.noKey) || !u) return;
          setModelsLoading(prev=>({...prev,[id]:true}));
          const fmt = chatProv?.format || "openai";
          const models = await fetchModelsFromProvider(k, u, fmt, id);
          setFetchedModels(prev=>({...prev,[id]:models}));
          setModelsLoading(prev=>({...prev,[id]:false}));
        }}/>}

      {/* ── Body ── */}
      <div style={{flex:1,display:"flex",overflow:"hidden"}}>

        {/* Chat Panel */}
        <div style={{
          width:380, maxWidth:"42vw", minWidth:340, display:"flex", flexDirection:"column",
          borderRight:"1px solid var(--border-subtle)", flexShrink:0,
          background:"var(--bg-primary)",
        }}>

          <div style={{flex:1,overflowY:"auto",padding:"18px 16px 0"}}>
            {msgs.map(m=><MsgBubble key={m.id} msg={m} onQuickIdea={quickIdea}/>)}
            {busy && (
              <div style={{display:"flex",gap:10,marginBottom:16}}>
                <div style={{
                  width:28, height:28, borderRadius:8, flexShrink:0,
                  background:"var(--bg-surface)", border:"1px solid var(--border-default)",
                  display:"flex", alignItems:"center", justifyContent:"center",
                }}>
                  <Ic n="sparkle" size={13} color="var(--accent)" sw={1.3}/>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:5,paddingTop:8}}>
                  {[0,1,2].map(i=>(
                    <div key={i} style={{
                      width:4, height:4, borderRadius:"50%",
                      background:"var(--accent)",
                      animation:`dot 1.2s ease-in-out ${i*.2}s infinite`,
                    }}/>
                  ))}
                </div>
              </div>
            )}
            <div ref={endRef}/>
          </div>

          {/* Input Area */}
          <div style={{padding:"12px 14px 16px",flexShrink:0}}>
            {selItem && (
              <div style={{
                display:"flex", alignItems:"center", gap:6, padding:"5px 10px",
                marginBottom:8, background:"var(--accent-soft)",
                border:"1px solid var(--border-accent)", borderRadius:6,
              }}>
                <Ic n="wand" size={10} color="var(--accent)" sw={1.3}/>
                <span style={{
                  fontSize:10, color:"var(--accent)", flex:1, fontWeight:500,
                  overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap",
                }}>
                  修改模式：{selItem.label}
                </span>
                <button onClick={()=>setSelId(null)}
                  style={{background:"none",border:"none",color:"var(--accent)",display:"flex",padding:0}}>
                  <Ic n="close" size={10} sw={1.4}/>
                </button>
              </div>
            )}

            <div className="sai-input-wrap" style={{
              background:"var(--bg-surface)", borderRadius:12,
            }}>

              {/* 风格预设：可展开，不再挤在一行里 */}
              <div style={{padding:"8px 10px 0"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
                  <button onClick={()=>setStyleOpen(!styleOpen)}
                    style={{
                      display:"flex",alignItems:"center",gap:5,padding:"3px 8px",
                      background:stylePreset?"var(--accent-soft)":"transparent",
                      border:`1px solid ${stylePreset?"var(--border-accent)":"var(--border-subtle)"}`,
                      borderRadius:20,color:stylePreset?"var(--accent)":"var(--text-muted)",
                      fontSize:9,fontWeight:600,letterSpacing:"0.04em",
                    }}>
                    <Ic n={styleOpen?"chevUp":"chevDown"} size={9} sw={1.5}/>
                    风格
                    <span style={{maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                      {stylePreset ? STYLE_PRESETS.find(s=>s.id===stylePreset)?.label : "选择预设"}
                    </span>
                  </button>
                  {stylePreset && (
                    <button onClick={()=>setStylePreset("")}
                      style={{background:"none",border:"none",color:"var(--text-muted)",fontSize:9,padding:"2px 4px"}}>
                      清除
                    </button>
                  )}
                </div>
                {styleOpen && (
                  <div style={{
                    display:"grid",
                    gridTemplateColumns:"repeat(2,minmax(0,1fr))",
                    gap:5, marginTop:7, maxHeight:132, overflowY:"auto", paddingRight:2,
                  }}>
                    {STYLE_PRESETS.map(s=>(
                      <button key={s.id} onClick={()=>setStylePreset(stylePreset===s.id?"":s.id)}
                        title={s.label}
                        style={{
                          padding:"5px 8px", fontSize:10, borderRadius:8, minWidth:0,
                          background: stylePreset===s.id ? "var(--accent-soft)" : "rgba(255,255,255,0.02)",
                          border:`1px solid ${stylePreset===s.id ? "var(--border-accent)" : "var(--border-subtle)"}`,
                          color: stylePreset===s.id ? "var(--accent)" : "var(--text-secondary)",
                          fontWeight: stylePreset===s.id ? 600 : 400,
                          transition:"all .15s", textAlign:"left",
                          overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap",
                        }}>
                        {s.emoji} {s.label}
                      </button>
                    ))}
                  </div>
                )}
              </div>

              {/* 画幅比例行 */}
              <div style={{display:"flex",gap:4,padding:"6px 10px 0",alignItems:"center",overflowX:"auto"}}>
                <span style={{fontSize:9,color:"var(--text-ghost)",letterSpacing:"0.06em",textTransform:"uppercase",marginRight:2,flexShrink:0}}>画幅</span>
                {ASPECT_RATIOS.map(r=>(
                  <button key={r.id} onClick={()=>setAspectRatio(r.id)}
                    style={{
                      padding:"2px 8px", fontSize:9, borderRadius:20, flexShrink:0,
                      background: aspectRatio===r.id ? "var(--accent-soft)" : "transparent",
                      border:`1px solid ${aspectRatio===r.id ? "var(--border-accent)" : "var(--border-subtle)"}`,
                      color: aspectRatio===r.id ? "var(--accent)" : "var(--text-muted)",
                      fontWeight: aspectRatio===r.id ? 600 : 400,
                      transition:"all .15s", fontFamily:"var(--font-mono)",
                    }}
                    onMouseEnter={e=>{if(aspectRatio!==r.id){e.currentTarget.style.borderColor="var(--border-default)";e.currentTarget.style.color="var(--text-secondary)"}}}
                    onMouseLeave={e=>{if(aspectRatio!==r.id){e.currentTarget.style.borderColor="var(--border-subtle)";e.currentTarget.style.color="var(--text-muted)"}}}>
                    {r.label}
                  </button>
                ))}
              </div>

              <textarea value={input} onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
                placeholder={selItem?`告诉我如何修改「${selItem.label}」…`:"描述你想创作的内容…"}
                rows={2} style={{
                  width:"100%", background:"transparent", border:"none", outline:"none",
                  padding:"8px 14px 4px", color:"var(--text-primary)", fontSize:13,
                  resize:"none", lineHeight:1.65, fontFamily:"var(--font-body)",
                  boxSizing:"border-box",
                }}/>
              <div style={{
                display:"flex", alignItems:"center", justifyContent:"space-between",
                padding:"4px 10px 8px",
              }}>
                <div style={{display:"flex",gap:4,flexWrap:"wrap",alignItems:"center"}}>
                  <button onClick={()=>{
                    updateCfg({...cfg, thinkingEnabled:!cfg.thinkingEnabled});
                  }} title="真实调用模型思考/推理参数。DeepSeek 使用 stream + thinking.enabled + reasoning_effort；OpenAI 官方推理模型走 Responses API reasoning；Claude 走 thinking。"
                    style={{
                      padding:"3px 9px", fontSize:9,
                      background:cfg.thinkingEnabled?"var(--accent-soft)":"transparent",
                      border:`1px solid ${cfg.thinkingEnabled?"var(--border-accent)":"var(--border-subtle)"}`,
                      borderRadius:20, color:cfg.thinkingEnabled?"var(--accent)":"var(--text-muted)",
                      display:"flex", alignItems:"center", gap:3,
                      letterSpacing:"0.02em", fontWeight:600,
                      transition:"all .15s",
                    }}>
                    <Ic n="sparkle" size={8} sw={1.4}/>{cfg.thinkingEnabled?"思考开":"思考关"}
                  </button>
                  {cfg.thinkingEnabled && (
                    <select value={cfg.thinkingEffort||"medium"}
                      onChange={e=>updateCfg({...cfg,thinkingEffort:e.target.value})}
                      title="思考强度：越高越慢、越贵，但规划和提示词通常更稳"
                      style={{
                        height:22, padding:"0 7px", fontSize:9, borderRadius:20,
                        background:"var(--bg-primary)", color:"var(--accent)",
                        border:"1px solid var(--border-accent)", outline:"none",
                        fontFamily:"var(--font-mono)",
                      }}>
                      <option value="low">low</option>
                      <option value="medium">medium</option>
                      <option value="high">high</option>
                      <option value="max">max</option>
                    </select>
                  )}
                  <button onClick={resetChat} title="重置对话（保留画布）"
                    style={{
                      padding:"3px 9px", fontSize:9,
                      background:"transparent", border:"1px solid var(--border-subtle)",
                      borderRadius:20, color:"var(--text-muted)",
                      display:"flex", alignItems:"center", gap:3,
                      letterSpacing:"0.02em", fontWeight:500,
                      transition:"all .15s",
                    }}
                    onMouseEnter={e=>e.currentTarget.style.color="var(--text-secondary)"}
                    onMouseLeave={e=>e.currentTarget.style.color="var(--text-muted)"}>
                    <Ic n="rotate" size={8} sw={1.4}/>重置
                  </button>
                </div>
                <button onClick={send} disabled={!input.trim()||busy}
                  style={{
                    width:32, height:32, borderRadius:8,
                    background: input.trim()&&!busy ? "var(--accent)" : "rgba(255,255,255,0.03)",
                    border: input.trim()&&!busy ? "none" : "1px solid var(--border-subtle)",
                    display:"flex", alignItems:"center", justifyContent:"center",
                    transition:"all .2s",
                  }}>
                  <Ic n="send" size={14}
                    color={input.trim()&&!busy ? "#1A1608" : "var(--text-ghost)"}
                    sw={1.5}/>
                </button>
              </div>
            </div>

            <p style={{
              fontSize:9, color:"var(--text-ghost)", marginTop:6, textAlign:"center",
              letterSpacing:"0.03em",
            }}>
              Enter 发送 · Shift+Enter 换行 · 思考模式会调用支持模型的真实推理参数
            </p>
          </div>
        </div>

        {/* Canvas Area */}
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div style={{
            display:"flex", alignItems:"center", justifyContent:"space-between",
            padding:"10px 18px", borderBottom:"1px solid var(--border-subtle)", flexShrink:0,
          }}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{
                fontSize:10, color:"var(--text-muted)", letterSpacing:"0.06em",
                textTransform:"uppercase", fontWeight:600,
              }}>
                {canvas.length>0 ? `${canvas.length} 个作品` : "画布"}
              </span>
            </div>
            <div style={{display:"flex",gap:6}}>
              {selId && (
                <button onClick={()=>setSelId(null)}
                  style={{
                    display:"flex", alignItems:"center", gap:4, padding:"3px 10px",
                    background:"transparent", border:"1px solid var(--border-subtle)",
                    borderRadius:6, color:"var(--text-muted)", fontSize:10,
                    fontWeight:500, transition:"all .15s",
                  }}
                  onMouseEnter={e=>e.currentTarget.style.borderColor="var(--border-default)"}
                  onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border-subtle)"}>
                  <Ic n="close" size={9} sw={1.4}/>取消选择
                </button>
              )}
              {canvas.length>0 && (
                <button onClick={()=>{setCanvas([]);setSelId(null);}}
                  style={{
                    display:"flex", alignItems:"center", gap:4, padding:"3px 10px",
                    background:"var(--danger-soft)", border:"1px solid rgba(196,85,74,0.12)",
                    borderRadius:6, color:"var(--danger)", fontSize:10,
                    fontWeight:500, transition:"all .15s",
                  }}
                  onMouseEnter={e=>e.currentTarget.style.borderColor="rgba(196,85,74,0.25)"}
                  onMouseLeave={e=>e.currentTarget.style.borderColor="rgba(196,85,74,0.12)"}>
                  <Ic n="trash" size={9} sw={1.4}/>清空
                </button>
              )}
            </div>
          </div>

          <div style={{flex:1,display:"flex",overflow:"hidden"}}>
            <div style={{flex:1,overflowY:"auto",padding:16}}>
              {canvas.length===0 ? (
                <div style={{
                  height:"100%", display:"flex", flexDirection:"column",
                  alignItems:"center", justifyContent:"center", gap:20, padding:20,
                }}>
                  <div style={{
                    width:64, height:64, borderRadius:16,
                    background:"var(--accent-glow)", border:"1px solid var(--border-accent)",
                    display:"flex", alignItems:"center", justifyContent:"center",
                  }}>
                    <Ic n="sparkle" size={26} color="var(--accent)" sw={1.2}/>
                  </div>
                  <div style={{textAlign:"center"}}>
                    <p style={{fontSize:14,color:"var(--text-secondary)",fontWeight:500,marginBottom:6,
                      fontFamily:"var(--font-display)",fontStyle:"italic"}}>
                      开始你的创作
                    </p>
                    <p style={{fontSize:11,color:"var(--text-muted)",lineHeight:1.6}}>
                      在左侧描述想法，选择风格和画幅，AI 为你生成设计
                    </p>
                  </div>
                </div>
              ) : (
                <div style={{
                  display:"grid",
                  gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",
                  gap:12,
                }}>
                  {canvas.map(item=>(
                    <CanvasCard key={item.id} item={item} sel={selId===item.id}
                      onClick={()=>setSelId(selId===item.id?null:item.id)}
                      onDel={delItem} onRegen={regen} onMod={modItem}/>
                  ))}
                </div>
              )}
            </div>
            {selId && selItem && (
              <DetailPanel item={selItem} onClose={()=>setSelId(null)}
                onMod={modItem} onRegen={regen} onDel={delItem}/>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Mount ──
document.getElementById("boot").style.display = "none";
const root = document.getElementById("root");
root.style.display = "block";
ReactDOM.createRoot(root).render(<App/>);
</script>
