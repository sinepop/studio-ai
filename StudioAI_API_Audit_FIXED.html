const getProviderById = (track, id) => {
  const arr = track === "chat" ? CHAT_PROVIDERS : track === "img" ? IMG_PROVIDERS : VID_PROVIDERS;
  return arr.find(p=>p.id===id) || arr[0];
};

const getProviderDefaultModel = (track, id) => getProviderById(track,id)?.defaultModel || "";

const fetchModelsFromProvider = async (apiKey, baseUrl, format="openai", providerId="") => {
  if (!baseUrl) return [];
  const base = baseUrl.replace(/\/$/, "");
  try {
    if (format === "gemini" || providerId === "gemini" || providerId === "gemini_img") {
      if (!apiKey) return [];
      const r = await apiFetch(`${base}/v1beta/models?key=${encodeURIComponent(apiKey.trim())}`, {
        signal: AbortSignal.timeout(8000),
      });
      if (!r.ok) return [];
      const d = await r.json();
      const list = d.models || [];
      return list.map(m => ({ id:String(m.name||"").replace(/^models\//,""), owned_by:"google" }))
                 .filter(m => m.id)
                 .sort((a,b)=>a.id.localeCompare(b.id));
    }

    const headers = {};
    if (format === "anthropic" || providerId === "claude") {
      if (!apiKey) return [];
      headers["x-api-key"] = apiKey.trim();
      headers["anthropic-version"] = "2023-06-01";
      headers["anthropic-dangerous-direct-browser-access"] = "true";
    } else {
      if (!apiKey) return [];
      headers["Authorization"] = `Bearer ${apiKey.trim()}`;
    }
    const r = await apiFetch(getOpenAIModelsURL(base), {
      headers,
      signal: AbortSignal.timeout(8000),
    });
    if (!r.ok) return [];
    const d = await r.json();
    const list = d.data || d.models || d;
    if (!Array.isArray(list)) return [];
    return list.map(m => ({ id:m.id || m.name || m, owned_by:m.owned_by || m.display_name || "" }))
               .filter(m => m.id)
               .sort((a,b) => String(a.id).localeCompare(String(b.id)));
  } catch { return []; }
};

// ─────────────────────────────────────────────────────────────
// API helpers: direct browser call + optional local proxy fallback
// Many providers do NOT allow browser-direct CORS. For self-use,
// set apiProxyBase to a local proxy such as http://127.0.0.1:8787.
// ─────────────────────────────────────────────────────────────
const nativeFetch = window.fetch.bind(window);

const getStoredCfg = () => {
  try { return JSON.parse(localStorage.getItem("sai_cfg") || "{}"); } catch { return {}; }
};

const getApiProxyBase = () => String(getStoredCfg().apiProxyBase || "").replace(/\/$/, "");

const shouldProxyURL = (url) => {
  const cfg = getStoredCfg();
  const proxy = String(cfg.apiProxyBase || "").replace(/\/$/, "");
  if (!proxy) return false;
  const u = String(url || "");
  if (!/^https?:\/\//i.test(u)) return false;
  if (u.startsWith(proxy)) return false;
  if (cfg.proxyAll) return true;
  if (u.includes("image.pollinations.ai")) return false;
  return true;
};

const apiFetch = async (url, options={}) => {
  if (!shouldProxyURL(url)) return nativeFetch(url, options);
  const proxy = getApiProxyBase();
  const body = options.body;
  return nativeFetch(`${proxy}/proxy`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      url:String(url),
      method:options.method || "GET",
      headers:options.headers || {},
      body:typeof body === "string" ? body : body ? JSON.stringify(body) : undefined,
    }),
    signal:options.signal,
  });
};

const trimBase = url => String(url || "").replace(/\/$/, "");

const getOpenAIChatURL = base => {
  const b = trimBase(base);
  if (/\/v1$/i.test(b)) return `${b}/chat/completions`;
  if (/\/(api\/v3|api\/paas\/v4)$/i.test(b)) return `${b}/chat/completions`;
  return `${b}/v1/chat/completions`;
};

const getOpenAIModelsURL = base => {
  const b = trimBase(base);
  if (/\/v1$/i.test(b)) return `${b}/models`;
  if (/\/(api\/v3|api\/paas\/v4)$/i.test(b)) return `${b}/models`;
  return `${b}/v1/models`;
};

const getOpenAIImageURL = base => {
  const b = trimBase(base);
  if (/\/v1$/i.test(b)) return `${b}/images/generations`;
  if (/\/api\/v3$/i.test(b)) return `${b}/images/generations`;
  return `${b}/v1/images/generations`;
};

const buildSys = (canvas, sel, stylePreset, aspectRatio) => {
  const canvasCtx = canvas.length === 0 ? "（画布为空）"
    : canvas.slice(0,12).map(c => `  [ID:${c.id}] "${c.label}" | 类型:${c.type||"image"} | ${c.prompt?.slice(0,120)}`).join("\n");

## 当前选中资产
ID:${sel.id} | 类型:${sel.type||"image"} | 标签:"${sel.label}"
完整Prompt:"${sel.prompt}"
Negative:"${sel.negative||""}"
→ 若用户说修改/调整/换风格，基于此资产继续改；若用户说动起来/做成视频，生成 image_to_video 任务并填 source_image_id。`

    ? `
## 当前风格预设
${STYLE_PRESETS.find(s=>s.id===stylePreset)?.label||stylePreset}风格，prompt末尾会自动追加该风格关键词`
    : "";
  const ratioCtx = aspectRatio
    ? `
## 当前画幅比例
${aspectRatio}`
    : "";
  return `你是 Studio AI，专业 AI 创意设计工作流 Agent。你的职责不是直接生成图片/视频，而是理解用户中文创意，并为当前配置的图片 API 或视频 API 产出可执行任务。

## 当前画布（${canvas.length}个资产）
${canvasCtx}
${selCtx}
${styleCtx}

## 响应格式（只输出纯JSON，不要markdown代码块）
{"understanding":"一句话理解用户意图","plan":["步骤1","步骤2"],"intent":"chat|generate_image|modify_image|generate_video|image_to_video","tasks":[{"id":"t1","type":"image|video","label":"中文短标签","prompt":"高质量英文prompt，80词以上，含主体/场景/镜头/构图/光线/色彩/材质/情绪/细节；视频还要包含运动、镜头、开头和结尾状态","negative_prompt":"low quality, blurry, deformed, watermark, text","source_image_id":null,"duration":5,"ratio":"${aspectRatio||"1:1"}"}],"reply":"中文友好回复"}

## 规则
1. 仅聊天/解释/提建议时：intent=chat，tasks=[]。
2. 用户要求生图/画/出图/做设计图时：intent=generate_image，tasks.type=image。
3. 用户要求生视频/动画/镜头运动/短片时：intent=generate_video，tasks.type=video。
4. 用户选中资产并说修改/调整/换背景/换风格：intent=modify_image，source_image_id填当前选中资产ID；prompt必须继承原图主体和未提及元素。
5. 用户选中图片并说动起来/做成视频/镜头推进/运镜：intent=image_to_video，tasks.type=video，source_image_id填当前选中图片ID。
6. prompt必须是英文且具体，不用泛泛的beautiful，要写清楚镜头、光线、材质、色彩、空间关系。
7. 可生成1-3个任务；若用户未要求多版本，默认1个。
8. reply必须中文，不要声称已经生成完成，只说明你的创作计划和正在执行。`;
};

  "16:9":"1536x1024",
  "9:16":"1024x1536",
  "3:2":"1536x1024",

const POLLINATIONS_DIM_MAP = {
  "1:1":  {w:1024,h:1024},

  "3:4":  {w:768,h:1024},
  "16:9": {w:1280,h:720},

const getExactImageSize = ratio => EXACT_IMAGE_SIZE_MAP[ratio] || EXACT_IMAGE_SIZE_MAP["1:1"];
const getPollinationsDims = ratio => POLLINATIONS_DIM_MAP[ratio] || POLLINATIONS_DIM_MAP["1:1"];
const getOpenAIImageSize = (model, ratio) => {
  const m = String(model || "").toLowerCase();
  // gpt-image-2 supports arbitrary WIDTHxHEIGHT within documented limits; use true ratios.
  if (m.includes("gpt-image-2")) return getExactImageSize(ratio);
  // gpt-image-1 / DALL·E have narrower official size support; use nearest legal size.
  return OPENAI_LEGACY_SIZE_MAP[ratio] || OPENAI_LEGACY_SIZE_MAP["1:1"];
};
const getAspectInstruction = ratio => `The final composition must be designed for a strict ${ratio} aspect ratio.`;

const genPollinations = (prompt, seed, w=1024, h=1024) => {
  const q = encodeURIComponent(String(prompt || "").slice(0,900));
  return `https://image.pollinations.ai/prompt/${q}?seed=${seed}&width=${w}&height=${h}&nologo=true&enhance=true`;
};

const shouldSendNegativePrompt = (providerId, baseUrl) => {
  // Google Gemini / OpenAI / most OpenAI-compatible image APIs reject `negative_prompt`.
  // Keep it only for SD/Stability-like middlewares that explicitly accept it.
  const b = String(baseUrl || "").toLowerCase();
  return providerId === "sd" || b.includes("stable-diffusion") || b.includes("stability");
};

const findGeminiInlineImage = obj => {
  const parts = obj?.candidates?.[0]?.content?.parts || obj?.parts || [];
  for (const p of parts) {
    const inline = p.inlineData || p.inline_data;
    if (inline?.data) {
      const mime = inline.mimeType || inline.mime_type || "image/png";
      return `data:${mime};base64,${inline.data}`;
    }
  }
  return "";
};

const GEMINI_IMAGE_RATIO_MAP = {
  "1:1":"1:1",
  "4:3":"4:3",
  "3:4":"3:4",
  "16:9":"16:9",
  "9:16":"9:16",
  "3:2":"3:2",
};

const buildGeminiImageBody = (prompt, ratio, mode="full") => {
  const body = {
    contents:[{
      parts:[{
        text:`${getAspectInstruction(ratio || "1:1")}\n\n${prompt}`
      }]
    }]
  };
  if (mode === "full") {
    body.generationConfig = {
      responseModalities:["TEXT","IMAGE"],
      responseFormat:{
        image:{
          aspectRatio:GEMINI_IMAGE_RATIO_MAP[ratio || "1:1"] || "1:1"
        }
      }
    };
  } else if (mode === "modalities") {
    body.generationConfig = { responseModalities:["TEXT","IMAGE"] };
  } else if (mode === "format") {
    body.generationConfig = {
      responseFormat:{
        image:{
          aspectRatio:GEMINI_IMAGE_RATIO_MAP[ratio || "1:1"] || "1:1"
        }
      }
    };
  }
  return body;
};

const getGeminiImageEndpoint = (base, model) => {
  const clean = trimBase(base || "https://generativelanguage.googleapis.com");
  const m = model || "gemini-2.5-flash-image";
  // Google docs currently show /v1/models/{model}:generateContent for image models.
  // If a user uses a v1beta-only model/gateway, retry logic below switches to v1beta.
  return `${clean}/v1/models/${encodeURIComponent(m)}:generateContent`;
};

const genGeminiImage = async (prompt, key, base, model, ratio="1:1") => {
  if (!key) throw new Error("未配置 Gemini API Key");
  const m = model || "gemini-2.5-flash-image";
  const clean = trimBase(base || "https://generativelanguage.googleapis.com");
  const endpoints = [
    `${clean}/v1/models/${encodeURIComponent(m)}:generateContent`,
    `${clean}/v1beta/models/${encodeURIComponent(m)}:generateContent`,
  ];
  const modes = ["full", "modalities", "format", "plain"];
  let lastError = null;

  for (const endpoint of endpoints) {
    for (const mode of modes) {
      const r = await apiFetch(endpoint, {
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "x-goog-api-key":key.trim()
        },
        body:JSON.stringify(buildGeminiImageBody(prompt, ratio, mode))
      });
      const d = await r.json().catch(()=>({}));

      if (r.ok) {
        const parts = d.candidates?.[0]?.content?.parts || [];
        for (const p of parts) {
          const inline = p.inlineData || p.inline_data;
          if (inline?.data) {
            const mime = inline.mimeType || inline.mime_type || "image/png";
            return `data:${mime};base64,${inline.data}`;
          }
        }
        const textPart = parts.map(p=>p.text||"").filter(Boolean).join(" ").slice(0,260);
        if (textPart) lastError = `Gemini 返回了文字但没有返回图片：${textPart}`;
        else lastError = `Gemini 未返回图片，finishReason=${d.candidates?.[0]?.finishReason || "unknown"}`;
        continue;
      }

      const msg = d.error?.message || d.message || JSON.stringify(d).slice(0,260) || "未知";
      lastError = `${r.status}: ${msg}`;

      // If mode failed because of schema fields, try the next simpler mode.
      if (/responseModalities|responseFormat|aspectRatio|generationConfig|Unknown name|Invalid JSON payload/i.test(msg)) {
        continue;
      }
      // If endpoint is not found, try next endpoint version.
      if (r.status === 404) break;
    }
  }

  throw new Error(`Gemini 图片生成失败：${lastError || "未知错误"}。请确认模型支持图片输出，如 gemini-2.5-flash-image、gemini-3.1-flash-image 或 gemini-3-pro-image。`);
};

const genOpenAIImage = async ({ prompt, negative, key, base, model, ratio, providerId }) => {
  if (!key) throw new Error("未配置图片 API Key");
  if (!base) throw new Error("未配置图片 Base URL");
  const m = model || "gpt-image-2";
  const isDalle = /^dall-e/i.test(m);
  const body = {
    model:m,
    prompt:`${getAspectInstruction(ratio || "1:1")}\n\n${prompt}`,
    n:1,
    size:getOpenAIImageSize(m, ratio || "1:1"),
  };

  if (isDalle) body.response_format = "url";

  // 修复 Gemini / Google 兼容接口 400：Unknown name "negative_prompt"。
  // 默认不传 negative_prompt；只有 SD/Stability 类中转才传。
  if (negative && shouldSendNegativePrompt(providerId, base)) {
    body.negative_prompt = negative;
  }

  const r = await apiFetch(getOpenAIImageURL(base), {
    method:"POST",
    headers:{"Authorization":`Bearer ${key.trim()}`, "Content-Type":"application/json"},
    body:JSON.stringify(body),
  });
  const d = await r.json().catch(()=>({}));
  if (!r.ok) throw new Error(`图像 API 错误 (${r.status}): ${d.error?.message || d.message || "未知"}`);
  const it = d.data?.[0] || d.images?.[0];
  if (!it) throw new Error("图像 API 返回格式异常：没有 data[0]");
  if (typeof it === "string") return it;
  if (it.url) return it.url;
  if (it.b64_json) return `data:image/png;base64,${it.b64_json}`;
  if (it.image_url) return it.image_url;
  throw new Error("图像 API 未返回 url / b64_json");
};

const pollRunwayTask = async ({ base, key, taskId, onProgress }) => {
  for (let i=0; i<80; i++) {
    await sleep(i < 2 ? 3000 : 5000);
    const r = await apiFetch(`${cleanBase(base)}/v1/tasks/${taskId}`, {
      method:"GET",
      headers:{
        "Authorization":`Bearer ${key.trim()}`,
        "X-Runway-Version":"2024-11-06",
      },
    });
    const d = await r.json().catch(()=>({}));
    if (!r.ok) throw new Error(`Runway 查询任务失败 (${r.status}): ${d.error?.message || d.message || "未知"}`);
    onProgress?.(Math.min(95, 12 + i));
    const st = String(d.status || "").toUpperCase();
    if (st === "SUCCEEDED" || st === "COMPLETED" || st === "SUCCESS") {
      const output = d.output || d.outputs || d.result;
      const url = Array.isArray(output) ? output[0] : (output?.url || output?.video_url || output);
      if (!url) throw new Error("视频任务成功，但没有返回视频 URL");
      return { videoUrl:url, taskId, task:d };
    }
    if (["FAILED", "CANCELED", "CANCELLED"].includes(st)) {
      throw new Error(d.failure || d.error?.message || d.message || `视频任务失败：${st}`);
    }
  }
  throw new Error("视频任务超时：可稍后重试或检查服务商任务后台");
};

};

  }
  if (p.provider === "jimeng_vid") {
    return await genArkVideo({ prompt:card.prompt, sourceImageUrl:card.sourceImageUrl, key:p.key, base:p.base, model:p.model, ratio:card.ratio, duration:card.duration }, onProgress);
  }
  if (p.provider === "nanobanana_vid") {
    if (!p.base) throw new Error("Nano Banana 本身是图片模型，没有官方视频 API。请在该项中填写你的 Nano Banana 视频中转 Base URL，或改用 HappyHorse / 即梦2.0。");
  }
  return await genCustomVideoTask({ prompt:card.prompt, sourceImageUrl:card.sourceImageUrl, key:p.key, base:p.base, model:p.model, ratio:card.ratio, duration:card.duration }, onProgress);
};

const runMediaTask = async (card, onProgress) => {
  if ((card.type || "image") === "video") return await runVideoTask(card, onProgress);
  return await runImageTask(card);
};

// Backward-compatible wrapper for old code paths.
const generateMedia = async (item, prov, seed, dims) => {
  const card = {
    id:seed || Date.now(),
    type:item.type || "image",
    prompt:item.prompt,
    negative:item.negative_prompt || item.negative,
    ratio:item.ratio || "1:1",
    duration:item.duration || 5,
    sourceImageUrl:item.sourceImageUrl,
    providerSnapshot:(item.type === "video")
      ? { provider:prov?.vidProvider || "runway", key:prov?.runway?.key, base:prov?.runway?.url, model:prov?.runway?.model }
      : { provider:prov?.active || "dalle", key:prov?.img?.key, base:prov?.img?.url, model:prov?.img?.model },
  };
  if (dims && !item.ratio) {
    const hit = ASPECT_RATIOS.find(r=>r.w===dims.w && r.h===dims.h);
    if (hit) card.ratio = hit.id;
  }
  const res = await runMediaTask(card);
  return { url:res.imageUrl || res.videoUrl || res.url, ...res };
};

//  Chat API Calls + Real Thinking / Reasoning Mode
// ═══════════════════════════════════════════════════════════════
const extractJSONText = raw => {
  const s = String(raw || "").replace(/```json\s?|```/g, "").trim();
  try { return JSON.parse(s); } catch {}
  const a = s.indexOf("{"), b = s.lastIndexOf("}");
  if (a >= 0 && b > a) {
    try { return JSON.parse(s.slice(a, b + 1)); } catch {}
  }
  return { reply: raw || "", prompts: [], tasks: [], plan: [], action: "chat", intent: "chat" };
};

const getReasoningEffort = cfg => cfg.thinkingEffort || "medium";
const isOfficialOpenAIBase = base => /(^|\/\/)api\.openai\.com/i.test(String(base || ""));
const isOpenAIReasoningModel = model => /^(gpt-5|o[0-9]|o\d|gpt-oss)/i.test(String(model || ""));
const isDeepSeekBase = base => /api\.deepseek\.com|deepseek/i.test(String(base || ""));
const normalizeChatModelForThinking = (base, model, thinkingEnabled) => {
  if (!thinkingEnabled) return model;
  const m = String(model || "").trim();
  // DeepSeek 的真实思考接口是 deepseek-reasoner；deepseek-chat 不会返回 reasoning_content。
  if (isDeepSeekBase(base) && (!m || m === "deepseek-chat")) return "deepseek-reasoner";
  return m;
};

const collectOpenAIOutputText = data => {
  if (data.output_text) return data.output_text;
  const chunks = [];
  (data.output || []).forEach(item => {
    (item.content || []).forEach(c => {
      if (c.text) chunks.push(c.text);
      if (c.type === "output_text" && c.text) chunks.push(c.text);
    });
  });
  return chunks.join("");
};

const collectOpenAIReasoningSummary = data => {
  const chunks = [];
  (data.output || []).forEach(item => {
    if (item.type === "reasoning") {
      (item.summary || []).forEach(s => {
        if (typeof s === "string") chunks.push(s);
        else if (s.text) chunks.push(s.text);
      });
    }
  });
  return chunks.join("\n").trim();
};

const callGeminiChat = async (msgs, sys, cfg) => {
  const { key, base, model } = cfg;
  if (!key) throw new Error("未设置 Gemini API Key。");
  const endpoint = `${cleanBase(base || "https://generativelanguage.googleapis.com")}/v1beta/models/${encodeURIComponent(model || "gemini-2.5-pro")}:generateContent?key=${encodeURIComponent(key.trim())}`;
  const history = msgs
    .filter(m=>m.id!=="welcome"&&!m.isError&&m.content)
    .slice(-HISTORY_LIMIT)
    .map(m=>({
      role:m.role === "assistant" ? "model" : "user",
      parts:[{text:m.rawContent||m.content}]
    }));
  const body = {
    systemInstruction:{ parts:[{ text:sys }] },
    contents:history,
    generationConfig:{
      responseMimeType:"application/json",
      maxOutputTokens: cfg.thinkingEnabled ? 4096 : 1600,
    }
  };
  if (cfg.thinkingEnabled) {
    body.generationConfig.thinkingConfig = { thinkingBudget: cfg.thinkingEffort === "max" ? 24576 : cfg.thinkingEffort === "high" ? 8192 : 4096 };
  }
  const r = await apiFetch(endpoint, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(body)
  });
  const d = await r.json().catch(()=>({}));
  if (!r.ok) throw new Error(`Gemini 请求失败 (${r.status}): ${d.error?.message || d.message || "未知"}`);
  const raw = (d.candidates?.[0]?.content?.parts || []).map(p=>p.text || "").join("") || "{}";
  const thinkingSummary = (d.candidates?.[0]?.content?.parts || []).map(p=>p.thought || p.thoughtSignature || "").filter(Boolean).join("\n");
  const parsed = extractJSONText(raw);
  return { parsed, raw, thinkingSummary };
};

const callClaude = async (msgs, sys, cfg) => {
  const { key, base, model } = cfg;
  if (!key) throw new Error("未设置 API Key，请在设置中填写。");
  const history = msgs
    .filter(m=>m.id!=="welcome"&&!m.isError&&m.content)
    .slice(-HISTORY_LIMIT)
    .map(m=>({role:m.role, content:m.rawContent||m.content}));
  const ep = `${(base||"https://api.anthropic.com").replace(/\/$/,"")}/v1/messages`;

  const thinkingOn = !!cfg.thinkingEnabled;
  const body = {
    model:model||"claude-sonnet-4-6",
    max_tokens: thinkingOn ? 4096 : 1200,
    system:sys,
    messages:history,
  };

  if (thinkingOn) {
    // Claude 官方真实思考参数：adaptive thinking + output_config.effort。
    // 如果模型不支持 adaptive thinking，API 会返回 400；下面会自动降级为手动 extended thinking 再试一次。
    body.thinking = { type:"adaptive", display: cfg.thinkingShowSummary === false ? "omitted" : "summarized" };
    body.output_config = { effort: getReasoningEffort(cfg) };
  }

  const headers = {
    "Content-Type":"application/json",
    "x-api-key": key.trim(),
    "anthropic-version":"2023-06-01",
    "anthropic-dangerous-direct-browser-access":"true",
  };

  const doFetch = async payload => apiFetch(ep, {
    method:"POST",
    headers,
    body:JSON.stringify(payload)
  });

  let r = await doFetch(body);

  // 部分旧 Claude 3.7/4.5 模型不吃 adaptive thinking，自动用手动 extended thinking 重试一次。
  if (!r.ok && thinkingOn && r.status === 400) {
    const fallbackBody = {
      ...body,
      max_tokens: Math.max(4096, Number(body.max_tokens) || 4096),
      thinking: {
        type:"enabled",
        budget_tokens: Math.min(2048, Math.max(1024, (Number(body.max_tokens) || 4096) - 1024)),
        display: cfg.thinkingShowSummary === false ? "omitted" : "summarized",
      },
    };
    delete fallbackBody.output_config;
    r = await doFetch(fallbackBody);
  }

  if (!r.ok) {
    const e=await r.json().catch(()=>({}));
    if(r.status===401) throw new Error("API Key 无效，请检查设置。");
    if(r.status===429) throw new Error("请求过于频繁，请稍后再试。");
    if(r.status===529) throw new Error("Claude 服务过载，请稍后再试。");
    throw new Error(`请求失败 (${r.status}): ${e.error?.message||e.message||"未知"}`);
  }

  const data = await r.json();
  const textBlocks = data.content?.filter(b=>b.type==="text").map(b=>b.text||"") || [];
  const thinkingSummary = data.content?.filter(b=>b.type==="thinking").map(b=>b.thinking||"").filter(Boolean).join("\n").trim() || "";
  const raw = textBlocks.join("") || "{}";
  const parsed = extractJSONText(raw);
  return { parsed, raw, thinkingSummary };
};

const callOpenAIResponsesChat = async (msgs, sys, cfg) => {
  const { key, base, model } = cfg;
  const history = msgs
    .filter(m=>m.id!=="welcome"&&!m.isError&&m.content)
    .slice(-HISTORY_LIMIT)
    .map(m=>({role:m.role, content:m.rawContent||m.content}));

  const input = [{ role:"system", content:sys }, ...history];
  const ep = `${base.replace(/\/$/,"")}/v1/responses`;
  const body = {
    model:model||"gpt-5.1",
    input,
    max_output_tokens: cfg.thinkingEnabled ? 4096 : 1200,
    reasoning: cfg.thinkingEnabled
      ? { effort:getReasoningEffort(cfg), summary: cfg.thinkingShowSummary === false ? null : "auto" }
      : undefined,
  };
  if (!body.reasoning) delete body.reasoning;

  const r = await apiFetch(ep, {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":`Bearer ${key.trim()}`,
    },
    body:JSON.stringify(body)
  });

  if (!r.ok) {
    const e=await r.json().catch(()=>({}));
    throw new Error(`请求失败 (${r.status}): ${e.error?.message||e.message||"未知"}`);
  }

  const data = await r.json();
  const raw = collectOpenAIOutputText(data) || "{}";
  const thinkingSummary = collectOpenAIReasoningSummary(data);
  const parsed = extractJSONText(raw);
  return { parsed, raw, thinkingSummary };
};

const readOpenAICompatibleStream = async (r, handlers={}) => {
  const reader = r.body?.getReader?.();
  if (!reader) throw new Error("当前浏览器不支持流式读取，或服务端没有返回 stream。");
  const decoder = new TextDecoder("utf-8");
  let buf = "", content = "", reasoning = "";
  while (true) {
    const {done, value} = await reader.read();
    if (done) break;
    buf += decoder.decode(value, {stream:true});
    const parts = buf.split("\n\n");
    buf = parts.pop() || "";
    for (const part of parts) {
      const lines = part.split("\n").map(x=>x.trim()).filter(Boolean);
      for (const line of lines) {
        if (!line.startsWith("data:")) continue;
        const data = line.slice(5).trim();
        if (!data || data === "[DONE]") continue;
        try {
          const j = JSON.parse(data);
          const delta = j.choices?.[0]?.delta || {};
          const rc = delta.reasoning_content || delta.reasoning || "";
          const cc = delta.content || "";
          if (rc) {
            reasoning += rc;
            handlers.onThinking?.(reasoning);
          }
          if (cc) {
            content += cc;
            handlers.onContent?.(content);
          }
        } catch {}
      }
    }
  }
  return { content, reasoning };
};

const callDeepSeekThinkingStream = async (msgs, sys, cfg, handlers={}) => {
  const { key, base, model } = cfg;
  const effectiveModel = normalizeChatModelForThinking(base, model, true);
  const history = msgs
    .filter(m=>m.id!=="welcome"&&!m.isError&&m.content)
    .slice(-HISTORY_LIMIT)
    .map(m=>({role:m.role, content:m.rawContent||m.content}));
  const messages = [{ role:"system", content:sys }, ...history];
  const ep = `${cleanBase(base || "https://api.deepseek.com")}/v1/chat/completions`;
  const effort = cfg.thinkingEffort === "max" ? "max" : "high";
  const body = {
    model:effectiveModel || "deepseek-v4-pro",
    messages,
    stream:true,
    max_tokens: cfg.thinkingEffort === "max" ? 12000 : 6000,
    thinking:{ type:"enabled" },
    reasoning_effort: effort,
    response_format:{ type:"json_object" },
  };

  let r = await apiFetch(ep, {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":`Bearer ${key.trim()}`,
    },
    body:JSON.stringify(body)
  });

  // Older DeepSeek-compatible gateways may reject thinking/reasoning_effort; retry with deepseek-reasoner streaming.
  if (!r.ok) {
    const err = await r.clone().json().catch(()=>({}));
    const fallback = {
      model: model === "deepseek-reasoner" ? "deepseek-reasoner" : "deepseek-reasoner",
      messages,
      stream:true,
      max_tokens: cfg.thinkingEffort === "max" ? 12000 : 6000,
      response_format:{ type:"json_object" },
    };
    r = await apiFetch(ep, {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":`Bearer ${key.trim()}`,
      },
      body:JSON.stringify(fallback)
    });
    if (!r.ok) {
      const e = await r.json().catch(()=>err||{});
      throw new Error(`DeepSeek 思考请求失败 (${r.status}): ${e.error?.message || e.message || "未知"}`);
    }
  }

  const { content, reasoning } = await readOpenAICompatibleStream(r, handlers);
  const raw = content || "{}";
  const parsed = extractJSONText(raw);
  return { parsed, raw, thinkingSummary: reasoning };
};

const callOpenAIChat = async (msgs, sys, cfg, handlers={}) => {
  const { key, base, model } = cfg;
  const effectiveModel = normalizeChatModelForThinking(base, model, cfg.thinkingEnabled);
  if (!key) throw new Error("未设置 API Key，请在设置中填写。");
  if (!base) throw new Error("未设置 Base URL，请在设置中填写。");

  if (cfg.thinkingEnabled && isDeepSeekBase(base)) {
    return callDeepSeekThinkingStream(msgs, sys, {...cfg, model:effectiveModel}, handlers);
  }

  // OpenAI 官方推理模型走 Responses API，真实传 reasoning.effort / reasoning.summary。
  if (cfg.thinkingEnabled && isOfficialOpenAIBase(base) && isOpenAIReasoningModel(effectiveModel)) {
    return callOpenAIResponsesChat(msgs, sys, {...cfg, model: effectiveModel});
  }

  const history = msgs
    .filter(m=>m.id!=="welcome"&&!m.isError&&m.content)
    .slice(-HISTORY_LIMIT)
    .map(m=>({role:m.role, content:m.rawContent||m.content}));
  const messages = [{ role:"system", content:sys }, ...history];
  const ep = getOpenAIChatURL(base);
  const body = { model:effectiveModel||"gpt-4o", max_tokens: cfg.thinkingEnabled ? 2400 : 1200, messages };

  if (cfg.thinkingEnabled && !isDeepSeekBase(base)) {
    body.reasoning_effort = getReasoningEffort(cfg);
  }

  const r = await apiFetch(ep, {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":`Bearer ${key.trim()}`,
    },
    body:JSON.stringify(body)
  });
  if (!r.ok) {
    const e=await r.json().catch(()=>({}));
    if(r.status===401) throw new Error("API Key 无效，请检查设置。");
    if(r.status===429) throw new Error("请求过于频繁，请稍后再试。");
    throw new Error(`请求失败 (${r.status}): ${e.error?.message||e.message||"未知"}`);
  }
  const data = await r.json();
  const msg = data.choices?.[0]?.message || {};
  const raw = msg.content || msg.reasoning_content || "{}";
  const thinkingSummary = msg.reasoning_content || "";
  const parsed = extractJSONText(raw);
  return { parsed, raw, thinkingSummary };
};

const callChat = async (msgs, sys, cfg, handlers={}) => {
  // auto-detect format from base URL if not explicitly set
  let fmt = cfg.chatFormat;
  const b = (cfg.base||"").toLowerCase();
  if (!fmt || fmt === "anthropic") {
    if (b && !b.includes("anthropic")) fmt = b.includes("generativelanguage.googleapis.com") ? "gemini" : "openai";
  }
  if (fmt === "anthropic") return callClaude(msgs, sys, cfg);
  if (fmt === "gemini") return callGeminiChat(msgs, sys, cfg);
  return callOpenAIChat(msgs, sys, cfg, handlers);
};

          <>
            {!loaded && <div style={{position:"absolute",inset:0,display:"flex",
              alignItems:"center",justifyContent:"center",
              background:"var(--bg-surface)"}}>
              <div style={{width:20,height:20,border:"1.5px solid var(--border-default)",
                borderTopColor:"var(--accent)",borderRadius:"50%",animation:"spin .9s linear infinite"}}/>
            </div>}
            <img src={mediaUrl} alt={item.label}
              style={{width:"100%",height:"100%",objectFit:"cover",
                opacity:loaded?1:0, transition:"opacity .5s var(--ease-out)"}}
              onLoad={()=>setLoaded(true)} onError={()=>setLoaded(true)}/>
          </>
        )}

        {/* Video */}
        {isVid && item.status==="done" && mediaUrl && (
          <video src={mediaUrl} controls playsInline
            style={{width:"100%",height:"100%",objectFit:"cover",background:"var(--bg-elevated)"}}/>
        )}
        {isVid && item.status==="done" && !mediaUrl && (
          <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",
            alignItems:"center",justifyContent:"center",gap:10,
            background:"var(--accent-glow)"}}>
            <Ic n="film" size={26} color="var(--accent)" sw={1.2}/>
            <span style={{fontSize:10,color:"var(--accent)",fontWeight:500,
              letterSpacing:"0.04em"}}>视频任务已完成，未返回URL</span>
          </div>
        )}

        {/* Hover overlay */}
        {hov && item.status==="done" && (
          <div style={{
            position:"absolute",inset:0,background:"rgba(8,8,13,0.7)",
            backdropFilter:"blur(4px)",
            display:"flex",alignItems:"center",justifyContent:"center",gap:8,
            animation:"fadeIn .2s var(--ease-out)",
          }}>
            {mediaUrl && <button onClick={e=>{e.stopPropagation();window.open(mediaUrl,"_blank");}}
              style={{padding:8,background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.1)",
                borderRadius:6,display:"flex",transition:"background .15s"}}
              onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.15)"}
              onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,0.08)"}>
              <Ic n="eye" size={14} color="#fff" sw={1.4}/>
            </button>}
            <button onClick={e=>{e.stopPropagation();onRegen(item);}}
              style={{padding:8,background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.1)",
                borderRadius:6,display:"flex",transition:"background .15s"}}
              onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.15)"}
              onMouseLeave={e=>e.currentTarget.style.background="rgba(255,255,255,0.08)"}>
              <Ic n="refresh" size={14} color="#fff" sw={1.4}/>
            </button>
            <button onClick={e=>{e.stopPropagation();onMod(item);}}
              style={{padding:8,background:"var(--accent)",border:"none",
                borderRadius:6,display:"flex",transition:"transform .15s"}}
              onMouseEnter={e=>e.currentTarget.style.transform="scale(1.05)"}
              onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}>
              <Ic n="wand" size={14} color="#1A1608" sw={1.4}/>
            </button>
          </div>
        )}

        {/* Modified badge */}
        {item.modifiesId && (
          <div style={{position:"absolute",top:8,left:8}}>
            <div style={{
              display:"flex", alignItems:"center", gap:4, padding:"3px 8px",
              background:"rgba(8,8,13,0.85)", backdropFilter:"blur(8px)",
              borderRadius:20, fontSize:9, color:"var(--accent)", fontWeight:500,
              border:"1px solid var(--border-accent)",
            }}>
              <Ic n="layers" size={8} color="var(--accent)" sw={1.3}/> 修改自 #{item.modifiesId}
            </div>
          </div>
        )}
      </div>

      <div style={{padding:"10px 12px"}}>
        <p style={{
          fontSize:12, color:"var(--text-primary)", fontWeight:500,
          overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap",
          lineHeight:1.4,
        }}>{item.label}</p>
        <p style={{
          fontSize:9, color:"var(--text-muted)", marginTop:3,
          letterSpacing:"0.03em", textTransform:"uppercase",
        }}>{item.providerSnapshot?.provider || item.prov} · {item.type}</p>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  Component: Detail Panel
// ═══════════════════════════════════════════════════════════════
function DetailPanel({ item, onClose, onMod, onRegen, onDel }) {
  const [full, setFull] = useState(false);
  const mediaUrl = item.videoUrl || item.imageUrl || item.url;
  const acts = [
    { n:"wand",    l:"修改", fn:()=>onMod(item),  accent:true },
    { n:"refresh", l:"重新生成", fn:()=>onRegen(item) },
    { n:"download",l:"下载", fn:()=>mediaUrl&&window.open(mediaUrl,"_blank") },
    { n:"trash",   l:"删除",     fn:()=>onDel(item.id), danger:true },
  ];
  return (
    <div className="slide-in" style={{
      width:220, borderLeft:"1px solid var(--border-subtle)",
      padding:"16px 14px", overflowY:"auto", flexShrink:0,
      background:"var(--bg-elevated)",
    }}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <span style={{
          fontSize:12, fontWeight:600, color:"var(--text-primary)",
          overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", flex:1,
          fontFamily:"var(--font-display)", fontStyle:"italic",
        }}>{item.label}</span>
        <button onClick={onClose} style={{
          background:"none", border:"none", color:"var(--text-muted)", marginLeft:6,
          padding:2, display:"flex", transition:"color .15s",
        }}
        onMouseEnter={e=>e.currentTarget.style.color="var(--text-secondary)"}
        onMouseLeave={e=>e.currentTarget.style.color="var(--text-muted)"}>
          <Ic n="close" size={14} sw={1.4}/>
        </button>
      </div>

      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:16}}>
        {[(item.providerSnapshot?.provider || item.prov), item.providerSnapshot?.model, item.type].filter(Boolean).map(t=>(
          <span key={t} style={{
            display:"inline-flex", alignItems:"center", gap:3,
            padding:"3px 9px", background:"var(--accent-soft)",
            border:"1px solid var(--border-accent)", borderRadius:20,
            color:"var(--accent)", fontSize:9, fontWeight:500,
            letterSpacing:"0.03em",
          }}>
            <Ic n="zap" size={8} color="var(--accent)" sw={1.3}/>{t}
          </span>
        ))}
      </div>

      <div style={{marginBottom:16}}>
        <p style={{
          fontSize:9, color:"var(--text-muted)", textTransform:"uppercase",
          letterSpacing:"0.1em", marginBottom:6, fontWeight:600,
        }}>提示词</p>
        <p style={{
          fontSize:11, color:"var(--text-secondary)", lineHeight:1.7,
          wordBreak:"break-word",
          maxHeight:full?"none":80, overflow:"hidden",
          fontFamily:"var(--font-mono)", fontWeight:400,
        }}>{item.prompt}</p>
        {item.prompt?.length>180 && (
          <button onClick={()=>setFull(!full)}
            style={{
              fontSize:9, color:"var(--accent)", background:"none", border:"none",
              padding:0, marginTop:4, fontWeight:500, letterSpacing:"0.04em",
              textTransform:"uppercase",
            }}>
            {full?"收起":"展开"}
          </button>
        )}
      </div>

      {item.negative && (
        <div style={{marginBottom:16}}>
          <p style={{
            fontSize:9, color:"var(--text-muted)", textTransform:"uppercase",
            letterSpacing:"0.1em", marginBottom:6, fontWeight:600,
          }}>负向提示</p>
          <p style={{
            fontSize:10, color:"var(--text-ghost)", lineHeight:1.6,
            wordBreak:"break-word", fontFamily:"var(--font-mono)",
          }}>{item.negative}</p>
        </div>
      )}

      <div style={{display:"flex",flexDirection:"column",gap:4}}>
        {acts.map(({n,l,fn,accent,danger})=>(
          <button key={l} onClick={fn} style={{
            display:"flex", alignItems:"center", gap:8,
            width:"100%", padding:"8px 12px", justifyContent:"center",
            background: accent ? "var(--accent-soft)" : danger ? "var(--danger-soft)" : "rgba(255,255,255,0.02)",
            border:`1px solid ${accent ? "var(--border-accent)" : danger ? "rgba(196,85,74,0.15)" : "var(--border-subtle)"}`,
            borderRadius:6,
            color: accent ? "var(--accent)" : danger ? "var(--danger)" : "var(--text-secondary)",
            fontSize:11, fontWeight:500, letterSpacing:"0.02em",
            transition:"all .15s",
          }}
          onMouseEnter={e=>{
            if(accent) e.currentTarget.style.background="rgba(232,168,73,0.15)";
            else if(danger) e.currentTarget.style.background="rgba(196,85,74,0.12)";
            else e.currentTarget.style.background="rgba(255,255,255,0.04)";
          }}
          onMouseLeave={e=>{
            if(accent) e.currentTarget.style.background="var(--accent-soft)";
            else if(danger) e.currentTarget.style.background="var(--danger-soft)";
            else e.currentTarget.style.background="rgba(255,255,255,0.02)";
          }}>
            <Ic n={n} size={12} sw={1.3}/>
            {l}
          </button>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
//  Component: Settings Panel (Three-Track)
// ═══════════════════════════════════════════════════════════════
function SettingsPanel({ cfg, onChange, fromCC, fetchedModels, modelsLoading, onFetchModels, updateProviderKey, switchProvider, testConnection }) {
  const [tab, setTab] = useState("chat");
  const tabs = [{id:"chat",l:"对话模型",icon:"sparkle"},{id:"img",l:"图像模型",icon:"image"},{id:"vid",l:"视频模型",icon:"film"}];
  const [testResult, setTestResult] = useState(null); // {ok, msg, track, providerId}
  const [apiActionMsg, setApiActionMsg] = useState(null); // 顶部 API 保存/删除反馈


  const inpBase = {
    width:"100%", background:"var(--bg-primary)", fontSize:11, padding:"7px 10px",
    color:"var(--text-primary)", outline:"none", boxSizing:"border-box",
    fontFamily:"var(--font-mono)", borderRadius:6,
    border:"1px solid var(--border-default)", transition:"border-color .2s",
  };
  const lbl = {
    display:"block", fontSize:9, color:"var(--text-muted)", marginBottom:4,
    textTransform:"uppercase", letterSpacing:"0.08em", fontWeight:600,
  };
  const cardWrap = {
    padding:"14px 16px", background:"var(--bg-surface)",
    border:"1px solid var(--border-subtle)", borderRadius:8,
  };

  // Provider dropdown shared across tabs
  const ProviderSelect = ({ providers, activeId, onChangeProv }) => (
    <div style={{marginBottom:14}}>
      <label style={lbl}>Provider</label>
      <div style={{position:"relative",width:"100%"}}>
        <select value={activeId} onChange={e => onChangeProv(e.target.value)}
          style={{...inpBase, paddingRight:32, fontFamily:"var(--font-body)", cursor:"pointer"}}>
          {providers.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
        <span style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",pointerEvents:"none",display:"flex"}}>
          <Ic n="chevDown" size={12} color="var(--text-muted)" sw={1.4}/>
        </span>
      </div>
    </div>
  );

  // Key + URL fields
  const KeyUrlFields = ({ k, b, onK, onB, kPh, bPh, noKey }) => (
    <div style={{display:"grid",gridTemplateColumns:noKey?"1fr":"1fr 1fr",gap:10,marginBottom:12}}>
      {!noKey && (
        <div>
          <label style={lbl}>API Key</label>
          <input type="password" value={k} onChange={onK} placeholder={kPh}
            style={{
              ...inpBase,
              border: !k ? "1px solid rgba(232,168,73,0.35)" : "1px solid var(--border-default)",
            }}
            onFocus={e=>e.target.style.borderColor="var(--border-accent)"}
            onBlur={e=>e.target.style.borderColor=!k?"rgba(232,168,73,0.35)":"var(--border-default)"}/>
        </div>
      )}
      <div>
        <label style={lbl}>Base URL</label>
        <input type="text" value={b} onChange={onB} placeholder={bPh}
          style={inpBase}
          onFocus={e=>e.target.style.borderColor="var(--border-accent)"}
          onBlur={e=>e.target.style.borderColor="var(--border-default)"}/>
      </div>
    </div>
  );

  // Refresh button + model count badge
  const ModelHeader = ({ models, loading, providerId }) => (
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        {models.length > 0 && (
          <span style={{
            padding:"1px 8px", background:"var(--success-soft)",
            border:"1px solid rgba(93,174,139,0.15)", borderRadius:20,
            fontSize:9, color:"var(--success)", fontWeight:500,
          }}>{models.length} 个模型已发现</span>
        )}
        {models.length === 0 && !loading && (
          <span style={{fontSize:9,color:"var(--text-ghost)"}}>填写 Key 和 URL 后自动获取模型列表</span>
        )}
      </div>
      <button onClick={() => onFetchModels(providerId)} disabled={loading}
        style={{
          display:"flex",alignItems:"center",gap:4,padding:"3px 10px",
          background:"var(--accent-soft)", border:"1px solid var(--border-accent)",
          borderRadius:6, fontSize:10, color:"var(--accent)", fontWeight:500,
          opacity:loading ? 0.6 : 1, transition:"all .15s",
        }}>
        <Ic n="refresh" size={10} sw={1.4} className={loading ? "spin-anim" : ""}/>
        {loading ? "获取中" : "刷新模型"}
      </button>
    </div>
  );

  // Model chip list (clickable)
  const ModelChips = ({ models, activeModel, onSelect }) => models.length > 0 && (
    <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:4}}>
      {models.slice(0,18).map(m => (
        <button key={m.id} onClick={() => onSelect && onSelect(m.id)}
          style={{
            padding:"2px 7px",
            background: activeModel===m.id ? "var(--accent-soft)" : "rgba(255,255,255,0.02)",
            border:`1px solid ${activeModel===m.id ? "var(--border-accent)" : "var(--border-subtle)"}`,
            borderRadius:4, fontSize:9,
            color: activeModel===m.id ? "var(--accent)" : "var(--text-secondary)",
            fontFamily:"var(--font-mono)", fontWeight: activeModel===m.id ? 600 : 400,
            cursor: onSelect ? "pointer" : "default", transition:"all .15s",
          }}
          onMouseEnter={e=>{if(activeModel!==m.id){e.currentTarget.style.borderColor="var(--border-default)";e.currentTarget.style.color="var(--text-primary)";}}}
          onMouseLeave={e=>{if(activeModel!==m.id){e.currentTarget.style.borderColor="var(--border-subtle)";e.currentTarget.style.color="var(--text-secondary)";}}}
        >{m.id}</button>
      ))}
      {models.length > 18 && (
        <span style={{fontSize:9,color:"var(--text-muted)",padding:"2px 4px"}}>
          +{models.length - 18} 更多
        </span>
      )}
    </div>
  );

  const getTrackProviders = (track) => track === "chat" ? CHAT_PROVIDERS : track === "img" ? IMG_PROVIDERS : VID_PROVIDERS;
  const getProviderField = (track) => track === "chat" ? "chatProvider" : track === "img" ? "imgProvider" : "vidProvider";
  const getModelField = (track) => track === "chat" ? "chatModel" : track === "img" ? "imgModel" : "vidModel";
  const getFlatFields = (track) => track === "chat"
    ? { key:"chatKey", base:"chatBase", model:"chatModel" }
    : track === "img"
      ? { key:"imgKey", base:"imgBase", model:"imgModel" }
      : { key:"vidKey", base:"vidBase", model:"vidModel" };

  const getActiveApiMeta = () => {
    const providers = getTrackProviders(tab);
    const providerId = cfg[getProviderField(tab)];
    const provider = providers.find(p => p.id === providerId) || providers[0];
    const pk = cfg.providerKeys?.[tab]?.[providerId] || { key:"", base:provider?.defaultUrl || "" };
    const model = cfg[getModelField(tab)] || "";
    return { track:tab, providerId, provider, pk, model };
  };

  const showApiActionMsg = (msg, ok=true) => {
    setApiActionMsg({ msg, ok });
    window.clearTimeout(window.__saiApiActionTimer);
    window.__saiApiActionTimer = window.setTimeout(() => setApiActionMsg(null), 2600);
  };

  const saveCurrentApi = () => {
    saveCfg(cfg);
    const meta = getActiveApiMeta();
    showApiActionMsg(`已保存当前${tab==="chat"?"文本":tab==="img"?"图片":"视频"} API：${meta.provider?.name || meta.providerId}`);
  };

  const deleteCurrentApi = () => {
    const meta = getActiveApiMeta();
    const c = {
      ...cfg,
      providerKeys:{
        ...(cfg.providerKeys || {}),
        [tab]:{...(cfg.providerKeys?.[tab] || {})}
      }
    };
    c.providerKeys[tab][meta.providerId] = { key:"", base:meta.provider?.defaultUrl || "" };

    const fields = getFlatFields(tab);
    c[fields.key] = "";
    c[fields.base] = meta.provider?.defaultUrl || "";
    c[fields.model] = "";

    onChange(c);
    setTestResult(null);
    showApiActionMsg(`已删除当前 API 信息：${meta.provider?.name || meta.providerId}`);
  };

  const clearAllApiInfo = () => {
    if (!window.confirm("确定要清空所有文本、图片、视频 API 信息吗？这会删除本机 localStorage 中保存的 API Key、Base URL 和模型 ID。")) return;

    const resetTrack = (providers) => {
      const out = {};
      providers.forEach(p => { out[p.id] = { key:"", base:p.defaultUrl || "" }; });
      return out;
    };

    const chatProvider = cfg.chatProvider || "claude";
    const imgProvider = cfg.imgProvider || "dalle";
    const vidProvider = cfg.vidProvider || "runway";
    const chatDefault = CHAT_PROVIDERS.find(p=>p.id===chatProvider)?.defaultUrl || "";
    const imgDefault = IMG_PROVIDERS.find(p=>p.id===imgProvider)?.defaultUrl || "";
    const vidDefault = VID_PROVIDERS.find(p=>p.id===vidProvider)?.defaultUrl || "";

    const c = {
      ...cfg,
      chatKey:"", chatBase:chatDefault, chatModel:"",
      imgKey:"", imgBase:imgDefault, imgModel:"",
      vidKey:"", vidBase:vidDefault, vidModel:"",
      providerKeys:{
        chat:resetTrack(CHAT_PROVIDERS),
        img:resetTrack(IMG_PROVIDERS),
        vid:resetTrack(VID_PROVIDERS),
      }
    };

    onChange(c);
    setTestResult(null);
    showApiActionMsg("已清空所有 API 信息");
  };

  const apiBtnStyle = (kind="normal") => ({
    display:"inline-flex", alignItems:"center", gap:5, padding:"5px 10px",
    background: kind==="danger" ? "var(--danger-soft)" : kind==="accent" ? "var(--accent-soft)" : "rgba(255,255,255,0.03)",
    border:`1px solid ${kind==="danger" ? "rgba(196,85,74,0.18)" : kind==="accent" ? "var(--border-accent)" : "var(--border-subtle)"}`,
    borderRadius:6, fontSize:10,
    color: kind==="danger" ? "var(--danger)" : kind==="accent" ? "var(--accent)" : "var(--text-secondary)",
    fontWeight:500, cursor:"pointer", transition:"all .15s",
  });

  // ── Chat Tab ──
  const chatProv = CHAT_PROVIDERS.find(p => p.id === cfg.chatProvider) || CHAT_PROVIDERS[0];
  const chatModels = fetchedModels[cfg.chatProvider] || [];

  // ── Image Tab ──
  const imgProv = IMG_PROVIDERS.find(p => p.id === cfg.imgProvider) || IMG_PROVIDERS[0];
  const imgModels = fetchedModels[cfg.imgProvider] || [];

  // ── Video Tab ──
  const vidProv = VID_PROVIDERS.find(p => p.id === cfg.vidProvider) || VID_PROVIDERS[0];
  const vidModels = fetchedModels[cfg.vidProvider] || [];

  return (
    <div className="slide-in" style={{
      background:"var(--bg-elevated)", borderBottom:"1px solid var(--border-subtle)",
      padding:"14px 20px", flexShrink:0,
    }}>
      {fromCC && (
        <div style={{
          display:"flex", alignItems:"center", gap:8, marginBottom:12,
          padding:"8px 14px", background:"var(--success-soft)",
          border:"1px solid rgba(93,174,139,0.15)", borderRadius:6,
        }}>
          <Ic n="check" size={12} color="var(--success)" sw={1.8}/>
          <p style={{fontSize:11,color:"var(--success)",fontWeight:500}}>
            CC Switch 已同步：API Key / BaseURL / 模型已自动读取。
          </p>
        </div>
      )}

      {/* Tabs */}
      <div style={{display:"flex",gap:4,marginBottom:10}}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)}
            style={{
              padding:"5px 14px", fontSize:11, borderRadius:6,
              display:"flex", alignItems:"center", gap:5,
              background: tab === t.id ? "var(--accent-soft)" : "transparent",
              border:`1px solid ${tab === t.id ? "var(--border-accent)" : "var(--border-subtle)"}`,
              color: tab === t.id ? "var(--accent)" : "var(--text-muted)",
              fontWeight: tab === t.id ? 600 : 400,
              transition:"all .2s",
            }}>
            <Ic n={t.icon} size={11} sw={1.3}/>
            {t.l}
          </button>
        ))}
      </div>

      {/* API config actions */}
      <div style={{
        display:"flex", alignItems:"center", justifyContent:"space-between",
        gap:10, marginBottom:14, padding:"8px 10px",
        background:"var(--bg-primary)", border:"1px solid var(--border-subtle)",
        borderRadius:8,
      }}>
        <div style={{display:"flex",alignItems:"center",gap:7,minWidth:0}}>
          <Ic n={tab==="chat"?"sparkle":tab==="img"?"image":"film"} size={11} color="var(--accent)" sw={1.3}/>
          <span style={{fontSize:10,color:"var(--text-secondary)",whiteSpace:"nowrap"}}>
            当前{tab==="chat"?"文本":tab==="img"?"图片":"视频"} API
          </span>
          <span style={{
            fontSize:10,color:"var(--text-primary)",fontWeight:600,
            overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:180,
          }}>
            {getActiveApiMeta().provider?.name || getActiveApiMeta().providerId}
          </span>
          {apiActionMsg && (
            <span style={{
              fontSize:10,
              color:apiActionMsg.ok?"var(--success)":"var(--danger)",
              whiteSpace:"nowrap",
            }}>{apiActionMsg.msg}</span>
          )}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
          <button onClick={saveCurrentApi} style={apiBtnStyle("accent")}>
            <Ic n="check" size={10} sw={1.5}/>保存当前 API
          </button>
          <button onClick={deleteCurrentApi} style={apiBtnStyle()}>
            <Ic n="trash" size={10} sw={1.5}/>删除当前 API
          </button>
          <button onClick={clearAllApiInfo} style={apiBtnStyle("danger")}>
            <Ic n="alert" size={10} sw={1.5}/>清空所有 API
          </button>
        </div>
      </div>

      <div style={{
        display:"grid", gridTemplateColumns:"120px 1fr", gap:8, alignItems:"center",
        marginBottom:14, padding:"8px 10px", background:"var(--bg-primary)",
        border:"1px solid var(--border-subtle)", borderRadius:8,
      }}>
